<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h3>🦅 Fofa Scraper</h3>
    <div class="status-box">
      <div id="status">Ready</div>
      <div>Countries: <span id="count-country">0</span> / <span id="count-total">48</span></div>
      <div>Found: <span id="count-found">0</span> &nbsp;
        <span style="font-size:0.8em">(<span id="count-valid" style="color:#4caf50">0</span> valid)</span>
      </div>
    </div>
  </div>

  <div class="controls">
    <button id="btn-start">🚀 Start</button>
    <button id="btn-stop"   class="hidden">🛑 Stop</button>
    <button id="btn-resume" class="hidden">▶️ Resume</button>
    <button id="btn-upload" disabled>⬆️ Upload</button>
  </div>

  <div class="settings">
    <label>Data Source:</label>
    <select id="select-domain">
      <option value="en.fofa.info" selected>en.fofa.info (Global)</option>
      <option value="fofa.info">fofa.info (CN/Stable)</option>
    </select>
    <div style="height:8px"></div>

    <label>Query:</label>
    <input type="text" id="input-query" value='body="api.telegram.org/bot"'>
    <div style="height:10px"></div>

    <hr style="border-color:#333;margin:4px 0">
    <label style="color:#aaa;font-size:0.85em">API config (stored in Chrome sync — paste once)</label>
    <div style="height:4px"></div>

    <label>API URL:</label>
    <input type="text" id="input-api-url" placeholder="http://localhost:8011">
    <div style="height:6px"></div>

    <label>Monitor Key (X-Monitor-Key):</label>
    <input type="password" id="input-monitor-key" placeholder="your MONITOR_API_KEY value">
  </div>

  <script src="popup.js"></script>
</body>
</html>
