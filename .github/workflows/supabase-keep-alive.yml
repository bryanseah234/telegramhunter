name: Supabase Keep Alive

on:
  schedule:
    - cron: "0 8 */5 * *"  # Every 5 days at 08:00 UTC — well within the 7-day pause window
  workflow_dispatch:        # Allow manual trigger from GitHub Actions UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          HTTP_CODE=$(curl -s -o /tmp/supabase_response.json -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/discovered_credentials?select=id&limit=1")

          echo "HTTP status: $HTTP_CODE"
          cat /tmp/supabase_response.json

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "❌ Supabase ping failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "✅ Supabase is alive (HTTP $HTTP_CODE)"
