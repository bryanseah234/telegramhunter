name: Supabase Keep Alive

on:
  schedule:
    - cron: "0 8 */3 * *" # Every 3 days at 08:00 UTC — within 7-day pause window
  workflow_dispatch:

jobs:
  keepalive:
    name: DB transaction keepalive
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: INSERT + DELETE to keepalive_log
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [[ -z "$SUPABASE_URL" ]]; then
            echo "::error::SUPABASE_URL secret is not set."
            exit 1
          fi

          echo "Writing keepalive row to $SUPABASE_URL ..."

          HTTP_INSERT=$(curl -s -o /tmp/insert.json -w "%{http_code}" \
            -X POST \
            --max-time 30 \
            "$SUPABASE_URL/rest/v1/keepalive_log" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"status":"ok"}')

          echo "INSERT HTTP: $HTTP_INSERT"
          cat /tmp/insert.json

          if [[ "$HTTP_INSERT" != "201" ]]; then
            echo "::error::INSERT failed (HTTP $HTTP_INSERT) — run database/migrations/001_keepalive_grant.sql in Supabase SQL editor if 403."
            exit 1
          fi

          # Delete rows older than 7 days to keep the table from growing
          CUTOFF=$(date -u -d '7 days ago' '+%Y-%m-%dT%H:%M:%SZ')
          curl -s -o /dev/null \
            -X DELETE \
            --max-time 30 \
            "$SUPABASE_URL/rest/v1/keepalive_log?created_at=lt.$CUTOFF" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Prefer: return=minimal"

          echo "✅ Supabase keepalive complete"
