name: Supabase Keep Alive

on:
  schedule:
    - cron: "0 8 */3 * *" # Every 3 days at 08:00 UTC — within 7-day pause window
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "Pinging Supabase at: $SUPABASE_URL"

          HTTP_STATUS=$(curl -s -o /tmp/supabase_response.json -w "%{http_code}" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            --retry-connrefused \
            "$SUPABASE_URL/rest/v1/" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")

          echo "HTTP Status: $HTTP_STATUS"
          cat /tmp/supabase_response.json

          if [[ "$HTTP_STATUS" == "200" ]]; then
            echo "✅ Supabase is alive (HTTP $HTTP_STATUS)"
          else
            echo "❌ Supabase ping failed (HTTP $HTTP_STATUS) — DB may be paused or secrets are wrong"
            exit 1
          fi

      - name: Report failure
        if: failure()
        run: |
          echo "::error::Supabase keepalive ping failed. Check that SUPABASE_URL and SUPABASE_KEY secrets are set correctly."
