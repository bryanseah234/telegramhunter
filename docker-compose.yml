name: telegramhunter

# Port defaults — override in .env if you have conflicts:
#   API_PORT=8011   (host port → container 8001)
#   REDIS_PORT=6379 (host port → container 6379)

services:
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-telegramhunter}_redis
    restart: always
    init: true
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME:-telegramhunter}_api
    restart: always
    init: true
    ports:
      - "${API_PORT:-8011}:8001"
    env_file: .env
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8001 --workers 2
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - ENV=${ENV:-development}
    volumes:
      - sessions:/app/sessions
      - imports:/app/imports
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  worker-core:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME:-telegramhunter}_worker-core
    restart: always
    init: true
    env_file: .env
    command: celery -A app.workers.celery_app worker -Q celery --loglevel=info --concurrency=4
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - sessions:/app/sessions
      - imports:/app/imports
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  worker-scanners:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME:-telegramhunter}_worker-scanners
    restart: always
    init: true
    env_file: .env
    command: celery -A app.workers.celery_app worker -Q scanners --loglevel=info --concurrency=2
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - sessions:/app/sessions
      - imports:/app/imports
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  worker-scrape:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME:-telegramhunter}_worker-scrape
    restart: always
    init: true
    env_file: .env
    command: celery -A app.workers.celery_app worker -Q scrape --loglevel=info --concurrency=2
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - sessions:/app/sessions
      - imports:/app/imports
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  beat:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME:-telegramhunter}_beat
    restart: always
    init: true
    env_file: .env
    command: celery -A app.workers.celery_app beat --loglevel=info --schedule /tmp/celerybeat-schedule
    depends_on:
      redis:
        condition: service_healthy
      worker-core:
        condition: service_started
    volumes:
      - sessions:/app/sessions
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  bot:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME:-telegramhunter}_bot
    restart: always
    init: true
    env_file: .env
    command: python -m app.services.bot_listener
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - sessions:/app/sessions
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis_data:
    name: ${COMPOSE_PROJECT_NAME:-telegramhunter}_redis_data
  sessions:
    name: ${COMPOSE_PROJECT_NAME:-telegramhunter}_sessions
  imports:
    name: ${COMPOSE_PROJECT_NAME:-telegramhunter}_imports
