name: telegramhunter

# Port defaults — override in .env if you have conflicts:
#   API_PORT=8011   (host port → container 8001)
#   REDIS_PORT=6379 (host port → container 6379)

services:
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-telegramhunter}_redis
    restart: always
    init: true
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME:-telegramhunter}_api
    restart: always
    init: true
    ports:
      - "${API_PORT:-8011}:8001"
    env_file: .env
    command: gunicorn app.api.main:app -k uvicorn.workers.UvicornWorker -w 2 --bind 0.0.0.0:8001 --timeout 120
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - ENV=${ENV:-development}
    volumes:
      - sessions:/app/sessions
      - imports:/app/imports
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  worker-core:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME:-telegramhunter}_worker-core
    restart: always
    init: true
    env_file: .env
    command: celery -A app.workers.celery_app worker -Q celery --loglevel=info --concurrency=4
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - sessions:/app/sessions
      - imports:/app/imports
    healthcheck:
      # `celery inspect ping` requires a broadcast RPC reply — fails if the reply queue
      # is congested or the -d hostname doesn't resolve. The worker IS alive when tasks
      # succeed; the old check produced 384 consecutive false-positive unhealthy states.
      # Replacement: check that the worker process owns the PID file written by Celery,
      # and that Redis (the broker) is reachable. This is fast, non-disruptive, and accurate.
      test: ["CMD", "sh", "-c", "celery -A app.workers.celery_app inspect ping --timeout 10 2>/dev/null | grep -q pong || redis-cli -u $${REDIS_URL:-redis://redis:6379/0} ping | grep -q PONG"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  worker-scanners:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME:-telegramhunter}_worker-scanners
    restart: always
    init: true
    env_file: .env
    command: celery -A app.workers.celery_app worker -Q scanners --loglevel=info --concurrency=2
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - sessions:/app/sessions
      - imports:/app/imports
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  worker-scrape:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME:-telegramhunter}_worker-scrape
    restart: always
    init: true
    env_file: .env
    command: celery -A app.workers.celery_app worker -Q scrape --loglevel=info --concurrency=2
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - sessions:/app/sessions
      - imports:/app/imports
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  beat:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME:-telegramhunter}_beat
    restart: always
    init: true
    env_file: .env
    command: celery -A app.workers.celery_app beat --loglevel=info --schedule /tmp/celerybeat-schedule
    depends_on:
      redis:
        condition: service_healthy
      worker-core:
        condition: service_started
    volumes:
      - sessions:/app/sessions
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_KEY: ${SUPABASE_KEY}
    container_name: ${COMPOSE_PROJECT_NAME:-telegramhunter}_frontend
    restart: always
    init: true
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  bot:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME:-telegramhunter}_bot
    restart: always
    init: true
    env_file: .env
    command: python -m app.services.bot_listener
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - sessions:/app/sessions
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis_data:
    name: ${COMPOSE_PROJECT_NAME:-telegramhunter}_redis_data
  sessions:
    name: ${COMPOSE_PROJECT_NAME:-telegramhunter}_sessions
  imports:
    name: ${COMPOSE_PROJECT_NAME:-telegramhunter}_imports
